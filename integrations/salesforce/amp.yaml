specVersion: 1.0.0
integrations:
  - name: readAndWriteSalesforce
    displayName: Salesforce read and write
    provider: salesforce
    read:
      objects:
        - objectName: account
          mapToName: company
          mapToDisplayName: Company
          destination: defaultWebhook
          schedule: "*/10 * * * *" # Every 10 minutes
          requiredFields:
            - fieldName: name
            - fieldName: billingcity
              mapToName: city
              mapToDisplayName: City
            - mapToName: country
              mapToDisplayName: Country
              prompt: Which field is the country for the account?
          optionalFieldsAuto: all
          backfill:
            defaultPeriod:
              fullHistory: true

        - objectName: contact
          destination: defaultWebhook
          requiredFields:
            - fieldName: name
          optionalFieldsAuto: all
          backfill:
            defaultPeriod:
              days: 7
          # No schedule for contact, since we are using subscribe actions.

    subscribe:
      objects:
        - objectName: contact
          destination: defaultWebhook
          inheritFieldsAndMapping: true
          createEvent:
            enabled: always
          updateEvent:
            enabled: always
            requiredWatchFields:
              - name
          deleteEvent:
            enabled: always
          otherEvents:
            - UNDELETE

    write:
      objects:
        - objectName: account
        - objectName: contact

    proxy:
      enabled: true